name: real_estate_finance_calculator
description: "حاسبة التمويل العقاري - تطبيق احترافي لحساب وإدارة ومقارنة التمويلات العقارية."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1

  # Local Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.3

  # Charts
  syncfusion_flutter_charts: ^33.2.15

  # Export
  pdf: ^3.11.1
  printing: ^5.13.1
  excel: ^4.0.6
  share_plus: ^9.0.0

  # Utilities
  intl: ^0.20.2
  uuid: ^4.4.0
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
